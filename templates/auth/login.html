{% extends "base.html" %}

{% block title %}Login - Mainframe AI Support{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 100px auto;">
    <div class="card">
        <div class="card-header" style="text-align: center; font-size: 28px;">
            ⚡ MAINFRAME AI SUPPORT
        </div>
        
        <h2 style="text-align: center; margin: 20px 0; color: var(--text-bright-green);">
            SYSTEM LOGIN
        </h2>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">USERNAME OR EMAIL</label>
                <input type="text" id="username" name="username" required autofocus 
                       placeholder="Enter your username or email">
            </div>
            
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Enter your password">
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember" value="1">
                    Remember me
                </label>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">
                    LOGIN
                </button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-green);">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 30px; color: var(--text-dim-green); font-size: 12px;">
        <p>⚠️ AUTHORIZED ACCESS ONLY ⚠️</p>
        <p>This system is for mainframe support personnel only</p>
    </div>
</div>
{% endblock %}
